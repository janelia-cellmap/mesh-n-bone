name: Tests

on:
  push:
    branches: [mesh-n-bone, master]
  pull_request:
    branches: [mesh-n-bone, master]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: test build-cgal
          cache: true

      - run: pixi run -e build-cgal build-cgal

      - run: pixi run -e test test
